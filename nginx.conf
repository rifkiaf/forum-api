limit_req_zone $binary_remote_addr zone=one:1m rate=90r/m;

server {
    listen 80;
    server_name forum-api-rifki.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name forum-api-rifki.duckdns.org;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/forum-api-rifki.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/forum-api-rifki.duckdns.org/privkey.pem;

    location /threads {
        limit_req zone=one; 
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}